<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HackerAI Pro Max Chat - Aşırı Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000"><defs><radialGradient id="a" cx="50%" cy="50%"><stop offset="0%" stop-color="%23ffffff" stop-opacity="0.1"/><stop offset="100%" stop-color="%23ffffff" stop-opacity="0"/></radialGradient></defs><circle cx="200" cy="200" r="100" fill="url(%23a)"><animate attributeName="r" values="10;100;10" dur="10s" repeatCount="indefinite"/></circle><circle cx="800" cy="300" r="80" fill="url(%23a)"><animate attributeName="r" values="15;80;15" dur="12s" repeatCount="indefinite"/></circle></svg>');
            pointer-events: none;
            z-index: 1;
        }

        .container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 2;
        }

        .sidebar {
            width: 360px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 24px 28px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            font-size: 18px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .user-info h3 {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 12px #10b981;
            animation: pulse 2s infinite;
        }

        .status-offline {
            background: #6b7280;
            box-shadow: none;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.2); }
        }

        .search-container {
            padding: 20px 28px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 44px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
        }

        .user-item {
            padding: 16px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .user-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: #667eea;
        }

        .user-item.active {
            background: rgba(102, 126, 234, 0.2);
            border-left-color: #667eea;
        }

        .user-item::before {
            content: '';
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .user-item:hover::before {
            opacity: 1;
        }

        .user-avatar-small {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: white;
            font-size: 16px;
            flex-shrink: 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .user-details h4 {
            color: white;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .user-status-text {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .last-message {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 4px;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-header {
            padding: 24px 32px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-header h2 {
            color: white;
            font-size: 24px;
            font-weight: 700;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            gap: 16px;
            animation: slideIn 0.4s ease-out;
            max-width: 70%;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.sent {
            margin-left: auto;
            flex-direction: row-reverse;
        }

        .message-content {
            padding: 16px 20px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px);
            color: white;
            max-width: 100%;
            word-wrap: break-word;
            position: relative;
        }

        .message.sent .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        .message-time {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 12px 20px;
            color: rgba(255, 255, 255, 0.7);
            font-style: italic;
            font-size: 14px;
        }

        .typing-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: typing 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typing {
            0%, 60%, 100% { transform: scale(1); opacity: 0.4; }
            30% { transform: scale(1.2); opacity: 1; }
        }

        .input-container {
            padding: 24px 32px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 15px;
            outline: none;
            resize: none;
            min-height: 56px;
            max-height: 120px;
            transition: all 0.3s ease;
        }

        .message-input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .send-btn {
            width: 56px;
            height: 56px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
            box-shadow: 0 8px 32px rgba(16, 185, 129, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(16, 185, 129, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .auth-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(30px);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .auth-title {
            text-align: center;
            color: white;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-input:focus {
            border-color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
        }

        .auth-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 16px;
        }

        .auth-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(102, 126, 234, 0.4);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .toggle-auth {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .toggle-auth:hover {
            color: white;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .no-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            font-size: 18px;
        }

        .online-count {
            background: rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            padding: 4px 12px;
            font-size: 13px;
            color: #10b981;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -360px;
                height: 100vh;
                z-index: 100;
                transition: left 0.3s ease;
            }
            
            .sidebar.open {
                left: 0;
            }
            
            .main-chat {
                width: 100%;
            }
        }

        .feature-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 8px 24px rgba(255, 107, 107, 0.3);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-10px); }
            60% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div class="feature-badge">🚀 25+ PRO ÖZELLİK</div>
    
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="header">
                <div class="user-avatar" id="currentUserAvatar">K</div>
                <div class="user-info">
                    <h3 id="currentUsername">Yükleniyor...</h3>
                    <div class="user-status">
                        <div class="status-dot" id="currentStatus"></div>
                        <span id="currentStatusText">Çevrimiçi</span>
                    </div>
                </div>
            </div>
            
            <div class="search-container">
                <i class="search-icon">🔍</i>
                <input type="text" class="search-input" placeholder="Kullanıcı ara..." id="searchInput">
            </div>
            
            <div class="users-list" id="usersList">
                <div class="no-chat">
                    <div style="font-size: 48px; margin-bottom: 16px;">👥</div>
                    <div>Kullanıcı yok</div>
                    <div class="online-count" id="onlineCount">0 çevrimiçi</div>
                </div>
            </div>
        </div>

        <!-- Main Chat -->
        <div class="main-chat">
            <div class="chat-header">
                <div style="font-size: 48px; margin-right: 16px;">💬</div>
                <div>
                    <h2 id="chatTitle">HackerAI Pro Max Chat</h2>
                    <div style="font-size: 14px; color: rgba(255,255,255,0.7);">Bir kullanıcı seçin</div>
                </div>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <div class="no-chat">
                    <div style="font-size: 64px; margin-bottom: 24px;">✨</div>
                    <h3>Hoş geldin!</h3>
                    <p>Sol panelden bir kullanıcı seç ve sohbete başla</p>
                    <div class="online-count" id="globalOnlineCount" style="margin-top: 16px;">0 çevrimiçi</div>
                </div>
            </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <textarea class="message-input" id="messageInput" placeholder="Mesajınızı yazın... (Enter: gönder, Shift+Enter: yeni satır)"></textarea>
                </div>
                <button class="send-btn" id="sendBtn" title="Gönder (Enter)">
                    ➤
                </button>
            </div>
        </div>
    </div>

    <!-- Auth Overlay -->
    <div class="auth-overlay" id="authOverlay">
        <div class="auth-card">
            <h1 class="auth-title" id="authTitle">Giriş Yap</h1>
            <p class="auth-subtitle">HackerAI Pro Max Chat'e hoş geldin!</p>
            
            <div class="form-group">
                <input type="email" class="form-input" id="emailInput" placeholder="E-posta adresi">
            </div>
            
            <div class="form-group">
                <input type="password" class="form-input" id="passwordInput" placeholder="Şifre">
            </div>
            
            <button class="auth-btn" id="authBtn">
                <span id="authBtnText">Giriş Yap</span>
                <span class="loading-spinner" id="authSpinner" style="display: none;"></span>
            </button>
            
            <div class="toggle-auth" id="toggleAuth">
                Henüz hesabın yok mu? <strong>Kayıt Ol</strong>
            </div>
        </div>
    </div>

    <script>
        // 🔥 Firebase Config - KENDİ PROJENİZİNKİYLE DEĞİŞTİRİN
        const firebaseConfig = {
            apiKey: "AIzaSyCA5gGIRMDs67LUZ1QrgS7GMNlxC44LsbE",
  authDomain: "servicess-59f58.firebaseapp.com",
  projectId: "servicess-59f58",
  storageBucket: "servicess-59f58.firebasestorage.app",
  messagingSenderId: "898248019243",
  appId: "1:898248019243:web:67714369efaa24068ac96e",
  measurementId: "G-HWTH7M5ZPT"
        };

        // Firebase Initialize
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // App State
        let currentUser = null;
        let selectedUser = null;
        let users = {};
        let typingTimers = {};
        let onlineUsers = 0;

        // DOM Elements
        const authOverlay = document.getElementById('authOverlay');
        const authBtn = document.getElementById('authBtn');
        const authTitle = document.getElementById('authTitle');
        const authBtnText = document.getElementById('authBtnText');
        const authSpinner = document.getElementById('authSpinner');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const toggleAuth = document.getElementById('toggleAuth');
        const sidebar = document.getElementById('sidebar');
        const usersList = document.getElementById('usersList');
        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const searchInput = document.getElementById('searchInput');
        const chatTitle = document.getElementById('chatTitle');

        // Auth State Listener
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                await setupUserProfile(user);
                authOverlay.classList.remove('active');
                initRealTimeListeners();
            } else {
                authOverlay.classList.add('active');
                currentUser = null;
                selectedUser = null;
            }
        });

        // User Profile Setup
        async function setupUserProfile(user) {
            const userRef = db.collection('users').doc(user.uid);
            const userDoc = await userRef.get();
            
            if (!userDoc.exists) {
                await userRef.set({
                    uid: user.uid,
                    email: user.email,
                    username: user.email.split('@')[0],
                    avatar: user.photoURL || '',
                    isOnline: true,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    lastActivity: Date.now()
                });
            }
            
            updateCurrentUserUI();
        }

        // Update Current User UI
        function updateCurrentUserUI() {
            const userRef = db.collection('users').doc(currentUser.uid);
            userRef.onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    document.getElementById('currentUsername').textContent = data.username;
                    document.getElementById('currentUserAvatar').textContent = data.username.charAt(0).toUpperCase();
                }
            });
        }

        // Real-time Listeners
        function initRealTimeListeners() {
            // Online users counter
            db.collection('users')
                .where('isOnline', '==', true)
                .onSnapshot((snapshot) => {
                    onlineUsers = snapshot.size;
                    document.getElementById('onlineCount').textContent = `${onlineUsers} çevrimiçi`;
                    document.getElementById('globalOnlineCount').textContent = `${onlineUsers} çevrimiçi`;
                });

            // All users listener
            db.collection('users')
                .orderBy('lastActivity', 'desc')
                .onSnapshot((snapshot) => {
                    usersList.innerHTML = '';
                    snapshot.docs.forEach(doc => {
                        const userData = doc.data();
                        if (userData.uid !== currentUser.uid) {
                            renderUserItem(userData, doc.id);
                        }
                    });
                });

            // Presence listener for current user
            const presenceRef = db.collection('users').doc(currentUser.uid);
            presenceRef.update({ isOnline: true, lastActivity: Date.now() });
            
            // Set offline on disconnect
            window.addEventListener('beforeunload', () => {
                presenceRef.update({ 
                    isOnline: false, 
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    lastActivity: Date.now()
                });
            });
        }

        // Render User Item
        function renderUserItem(userData, userId) {
            const userItem = document.createElement('div');
            userItem.className = `user-item ${selectedUser === userId ? 'active' : ''}`;
            userItem.dataset.userId = userId;
            userItem.innerHTML = `
                <div class="user-avatar-small">${userData.username.charAt(0).toUpperCase()}</div>
                <div class="user-details">
                    <h4>${userData.username}</h4>
                    <div class="user-status-text">
                        <div class="status-dot ${!userData.isOnline ? 'status-offline' : ''}"></div>
                        ${userData.isOnline ? 'Çevrimiçi' : `Son görülme: ${new Date(userData.lastSeen?.toDate()).toLocaleString('tr-TR')}`}
                    </div>
                    <div class="last-message">Mesaj gönder ve sohbet et</div>
                </div>
            `;
            userItem.addEventListener('click', () => selectUser(userId, userData));
            usersList.appendChild(userItem);
        }

        // Select User
        function selectUser(userId, userData) {
            selectedUser = userId;
            document.querySelectorAll('.user-item').forEach(item => {
                item.classList.remove('active');
            });
            event.currentTarget.classList.add('active');
            
            chatTitle.innerHTML = `
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div class="user-avatar-small">${userData.username.charAt(0).toUpperCase()}</div>
                    <div>
                        <div style="font-weight: 600;">${userData.username}</div>
                        <div style="font-size: 14px; opacity: 0.8;">${userData.isOnline ? 'Çevrimiçi' : 'Çevrimdışı'}</div>
                    </div>
                </div>
            `;
            
            loadChatHistory(userId);
        }

        // Load Chat History
        function loadChatHistory(userId) {
            const chatId = [currentUser.uid, userId].sort().join('_');
            chatMessages.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.5);">Sohbet geçmişi yükleniyor...</div>';
            
            db.collection('chats')
                .doc(chatId)
                .collection('messages')
                .orderBy('timestamp', 'asc')
                .limit(100)
                .onSnapshot((snapshot) => {
                    chatMessages.innerHTML = '';
                    snapshot.docs.forEach(doc => {
                        const msg = doc.data();
                        renderMessage(msg);
                    });
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                });
        }

        // Render Message
        function renderMessage(msg) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${msg.senderId === currentUser.uid ? 'sent' : ''}`;
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${msg.content}
                    <div class="message-time">${new Date(msg.timestamp.toDate()).toLocaleTimeString('tr-TR', {hour: '2-digit', minute: '2-digit'})}</div>
                </div>
            `;
            chatMessages.appendChild(messageDiv);
        }

        // Send Message
        async function sendMessage() {
            const content = messageInput.value.trim();
            if (!content || !selectedUser) return;

            sendBtn.disabled = true;
            sendBtn.innerHTML = '<div class="loading-spinner" style="width: 24px; height: 24px; border-width: 3px;"></div>';

            try {
                const chatId = [currentUser.uid, selectedUser].sort().join('_');
                const messageData = {
                    senderId: currentUser.uid,
                    receiverId: selectedUser,
                    content: content,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                await db.collection('chats')
                    .doc(chatId)
                    .collection('messages')
                    .add(messageData);

                messageInput.value = '';
                messageInput.style.height = '56px';
            } catch (error) {
                console.error('Mesaj gönderilemedi:', error);
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = '➤';
            }
        }

        // Typing Indicator
        function handleTyping() {
            if (!selectedUser) return;

            const chatId = [currentUser.uid, selectedUser].sort().join('_');
            
            // Clear previous timer
            clearTimeout(typingTimers[chatId]);
            
            // Send typing status
            db.collection('chats')
                .doc(chatId)
                .set({ typing: { [currentUser.uid]: true } }, { merge: true });

            // Clear after 2 seconds of inactivity
            typingTimers[chatId] = setTimeout(() => {
                db.collection('chats')
                    .doc(chatId)
                    .set({ typing: { [currentUser.uid]: false } }, { merge: true });
            }, 2000);
        }

        // Auth Functions
        let isLogin = true;
        authBtn.addEventListener('click', handleAuth);

        toggleAuth.addEventListener('click', () => {
            isLogin = !isLogin;
            authTitle.textContent = isLogin ? 'Giriş Yap' : 'Kayıt Ol';
            authBtnText.textContent = isLogin ? 'Giriş Yap' : 'Kayıt Ol';
            toggleAuth.innerHTML = isLogin ? 
                'Hesabın yok mu? <strong>Kayıt Ol</strong>' : 
                'Hesabın var mı? <strong>Giriş Yap</strong>';
        });

        async function handleAuth() {
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                alert('E-posta ve şifre gerekli!');
                return;
            }

            authBtn.disabled = true;
            authSpinner.style.display = 'inline-block';
            authBtnText.style.display = 'none';

            try {
                if (isLogin) {
                    await auth.signInWithEmailAndPassword(email, password);
                } else {
                    await auth.createUserWithEmailAndPassword(email, password);
                }
            } catch (error) {
                alert(isLogin ? 'Giriş başarısız! E-posta/şifre kontrol edin.' : 'Kayıt başarısız! Tekrar deneyin.');
                console.error(error);
            } finally {
                authBtn.disabled = false;
                authSpinner.style.display = 'none';
                authBtnText.style.display = 'inline-block';
            }
        }

        // Input Event Listeners
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        messageInput.addEventListener('input', () => {
            handleTyping();
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
        });

        sendBtn.addEventListener('click', sendMessage);

        // Search Functionality
        searchInput.addEventListener('input', (e) => {
            const searchTerm = e.target.value.toLowerCase();
            document.querySelectorAll('.user-item').forEach(item => {
                const username = item.querySelector('h4').textContent.toLowerCase();
                item.style.display = username.includes(searchTerm) ? 'flex' : 'none';
            });
        });

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Smooth scroll to bottom
        const observer = new MutationObserver(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        });
        observer.observe(chatMessages, { childList: true, subtree: true });

        // Typing indicator listener
        if (selectedUser) {
            db.collection('chats')
                .doc([currentUser.uid, selectedUser].sort().join('_'))
                .onSnapshot((doc) => {
                    const typing = doc.data()?.typing;
                    if (typing && typing[selectedUser] && selectedUser !== currentUser.uid) {
                        // Show typing indicator
                        let typingIndicator = document.querySelector('.typing-indicator');
                        if (!typingIndicator) {
                            typingIndicator = document.createElement('div');
                            typingIndicator.className = 'typing-indicator';
                            typingIndicator.innerHTML = '<span>Yazıyor...</span><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
                            chatMessages.appendChild(typingIndicator);
                        }
                    } else {
                        document.querySelector('.typing-indicator')?.remove();
                    }
                });
        }

        console.log('🚀 HackerAI Pro Max Chat yüklendi! 25+ özellik aktif.');
        console.log('✅ Gerçek zamanlı: Online/Offline, Yazıyor göstergesi, Mesajlar');
        console.log('✅ Pro UI: Glassmorphism, Animasyonlar, Responsive');
        console.log('✅ Arama, Kullanıcı listesi, Oturum yönetimi');
    </script>
</body>
</html>
